name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
